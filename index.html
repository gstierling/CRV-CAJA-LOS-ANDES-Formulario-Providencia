<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLA Providencia · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --surface: rgba(0,0,0,0.18);
    --surface2: rgba(0,0,0,0.28);
    --border: rgba(255,255,255,0.18);
    --orange: #f97316;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.6);
  }
  body {
    background: linear-gradient(160deg, #0097a7 0%, #006978 100%);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }
  .container { max-width: 960px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 2rem; text-align: center; }
  .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2px; }
  .live-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--orange); flex-shrink: 0; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }
  .title { font-size: 2.2rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  .title-sub { font-size: 1.3rem; font-weight: 700; color: rgba(255,255,255,0.7); margin-top: 0; }
  .last-updated { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }

  .error-msg { background: rgba(150,20,20,0.4); border: 1px solid rgba(255,100,100,0.4); border-radius: 10px; padding: 14px 18px; color: #ffaaaa; font-size: 1rem; margin-bottom: 1.5rem; display: none; }

  /* Selector de fecha */
  .date-block { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; gap: 6px; }
  .date-label { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .date-input {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    padding: 10px 18px;
    cursor: pointer;
    color-scheme: dark;
  }
  .date-input:focus { outline: none; border-color: var(--orange); }

  /* Selector */
  .selector-block { margin-bottom: 2.5rem; }
  .btn-total { display: block; width: 100%; padding: 18px; background: var(--surface); border: 2px solid var(--border); border-radius: 14px; color: var(--white); font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 900; letter-spacing: 0.1em; cursor: pointer; margin-bottom: 1.2rem; transition: all 0.15s; }
  .btn-total:hover { background: rgba(0,0,0,0.35); }
  .btn-total.active { background: var(--orange); border-color: var(--orange); }
  .ultimos-label { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 10px; }
  .tabs { display: flex; gap: 10px; }
  .tab { flex: 1; padding: 13px 10px; border-radius: 12px; border: 2px solid var(--border); font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; background: var(--surface); color: var(--white); transition: all 0.15s; text-align: center; }
  .tab:hover { background: rgba(0,0,0,0.35); }
  .tab.active { background: var(--orange); border-color: var(--orange); }

  /* Section label grande — igual para todos los títulos de sección */
  .section-label-big { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-bottom: 12px; }

  /* TRANSACCIONES cuadro — solo número y tasa, sin título dentro */
  .trans-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 16px 24px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .trans-value { font-size: 4rem; font-weight: 900; color: var(--white); line-height: 1; }
  .trans-rate { font-size: 1.4rem; font-weight: 800; color: rgba(255,255,255,0.75); }

  /* Barras */
  .chart-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 16px 16px 0; margin-bottom: 14px; }
  .bars-wrap { display: flex; align-items: flex-end; justify-content: space-around; gap: 14px; padding: 0 6px; height: 200px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; height: 100%; }
  .bar-stack { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .bar-val { font-size: 1.4rem; font-weight: 900; color: var(--white); line-height: 1; margin-bottom: 5px; }
  .bar-inner { width: 100%; border-radius: 10px 10px 0 0; min-height: 4px; }
  .bar-rate-row { display: flex; width: 100%; }
  .bar-rate { flex: 1; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); padding: 6px 2px 12px; }
  .bar-label-row { display: flex; width: 100%; border-top: 1px solid var(--border); }
  .bar-label { flex: 1; text-align: center; font-size: 1rem; font-weight: 800; color: rgba(255,255,255,0.85); padding: 10px 4px 12px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  /* Franja horizontal */
  .strip { display: flex; gap: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .strip-item { flex: 1; padding: 18px 12px; text-align: center; border-right: 1px solid var(--border); }
  .strip-item:last-child { border-right: none; }
  .strip-label { font-size: 0.8rem; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .strip-value { font-size: 2.8rem; font-weight: 900; color: var(--white); line-height: 1; }
  .strip-value.afiliado { color: #b2ebf2; }
  .strip-value.noafiliado { color: var(--orange); }
  .strip-value.s1 { color: #fde047; }
  .strip-value.s2 { color: #a78bfa; }
  .strip-value.s3 { color: #34d399; }
  .strip-rate { font-size: 0.85rem; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* BBDD button */
  .bbdd-wrap { margin-top: 2.5rem; text-align: center; }
  .bbdd-btn { display: inline-block; padding: 12px 36px; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; color: #b2ebf2; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; letter-spacing: 0.1em; text-decoration: none; transition: all 0.15s; }
  .bbdd-btn:hover { background: rgba(0,0,0,0.35); border-color: #b2ebf2; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="live-dot"></span>
      <span class="title">CAJA LOS ANDES</span>
    </div>
    <div class="title-sub">Providencia</div>
    <div class="last-updated" id="last-updated">Cargando…</div>
  </div>

  <!-- Selector de fecha -->
  <div class="date-block">
    <label for="date-picker" class="date-label">Fecha</label>
    <input type="date" id="date-picker" class="date-input" onchange="onDateChange()">
  </div>

  <!-- RESUMEN -->
  <div class="section-label-big">Resumen</div>
  <div class="strip" style="margin-bottom: 2rem;">
    <div class="strip-item">
      <div class="strip-label">Total Transacciones</div>
      <div class="strip-value" id="val-resumen-trans">—</div>
    </div>
    <div class="strip-item">
      <div class="strip-label">Total Afiliados</div>
      <div class="strip-value afiliado" id="val-resumen-afi">—</div>
    </div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <!-- Selector -->
  <div class="selector-block">
    <button class="btn-total active" data-min="0" onclick="setWindow(0)">TOTAL</button>
    <div class="ultimos-label">Últimos</div>
    <div class="tabs">
      <button class="tab" data-min="15" onclick="setWindow(15)">15 Minutos</button>
      <button class="tab" data-min="30" onclick="setWindow(30)">30 Minutos</button>
      <button class="tab" data-min="60" onclick="setWindow(60)">60 Minutos</button>
    </div>
  </div>

  <!-- TRANSACCIONES -->
  <div class="section-label-big">Transacciones</div>
  <div class="trans-block">
    <div class="trans-value" id="val-svc-total">—</div>
    <div class="trans-rate" id="rate-svc-total">— x min</div>
  </div>

  <!-- Barras -->
  <div class="chart-card">
    <div class="bars-wrap" id="bars-wrap"></div>
    <div class="bar-rate-row" id="bar-rates"></div>
    <div class="bar-label-row" id="bar-labels"></div>
  </div>

  <hr class="divider">

  <!-- REGISTROS -->
  <div class="section-label-big">Registros</div>
  <div class="strip">
    <div class="strip-item">
      <div class="strip-label">Totales</div>
      <div class="strip-value" id="val-total">—</div>
      <div class="strip-rate" id="rate-total">— x min</div>
    </div>
    <div class="strip-item">
      <div class="strip-label">Afiliados</div>
      <div class="strip-value afiliado" id="val-si">—</div>
      <div class="strip-rate" id="rate-si">— x min</div>
    </div>
    <div class="strip-item">
      <div class="strip-label">No afiliados</div>
      <div class="strip-value noafiliado" id="val-no">—</div>
      <div class="strip-rate" id="rate-no">— x min</div>
    </div>
  </div>

  <hr class="divider">

  <!-- AFILIADOS USAN SERVICIOS -->
  <div class="section-label-big">Afiliados usan servicios</div>
  <div class="strip">
    <div class="strip-item">
      <div class="strip-label">1 Servicio</div>
      <div class="strip-value s1" id="val-s1">—</div>
    </div>
    <div class="strip-item">
      <div class="strip-label">2 Servicios</div>
      <div class="strip-value s2" id="val-s2">—</div>
    </div>
    <div class="strip-item">
      <div class="strip-label">3 Servicios</div>
      <div class="strip-value s3" id="val-s3">—</div>
    </div>
  </div>

  <!-- BBDD -->
  <div class="bbdd-wrap">
    <a class="bbdd-btn" href="https://docs.google.com/spreadsheets/d/1J48WDExtFgjx22Zf9rjTR8IdhAmffc_Dzpw086Cimeo/edit" target="_blank">BBDD</a>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgndIP_bFGXJWbQgdvRlszrL4rqZzkeNuI7iXxkNiuW9HMSHA0oZIfIKo7Zu31HYnn7K_LbuHpkCTK/pub?gid=1084445575&single=true&output=csv";

const SVCS = [
  { key: "Préstamo de bicicleta",        label: "Bicis",    color: "#f97316" },
  { key: "Kit saludable (Agua + Fruta)",  label: "Kits",     color: "#fde047" },
  { key: "Reparaciones mecánicas",        label: "Mecánica", color: "#a78bfa" },
];

let records = [];
let currentWindow = 0;
let selectedDate = null; // null = hoy

function dateKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function onDateChange() {
  const val = document.getElementById("date-picker").value;
  selectedDate = val ? val : null;
  render();
}

function parseTS(str) {
  if (!str) return null;
  try {
    const isPM = /p\.\s*m\./.test(str);
    const clean = str.replace(/[ap]\.\s*m\./g, "").trim();
    const [datePart, timePart] = clean.split(", ");
    if (!datePart || !timePart) return null;
    const [d, m, y] = datePart.split("-").map(Number);
    let [h, min, s] = timePart.trim().split(":").map(Number);
    if (isPM && h !== 12) h += 12;
    if (!isPM && h === 12) h = 0;
    return new Date(y, m - 1, d, h, min, s || 0);
  } catch(e) { return null; }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = "", inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ""; }
      else { cur += ch; }
    }
    fields.push(cur);
    const ts = (fields[0] || "").replace(/^"|"$/g, "");
    const pertenece = (fields[2] || "").replace(/^"|"$/g, "").trim();
    const servicios = (fields[3] || "").replace(/^"|"$/g, "").trim();
    const date = parseTS(ts);
    if (date) result.push({ pertenece, servicios, date });
  }
  return result;
}

// Formatea número con 1 decimal y coma como separador
function fmt(v) {
  return v.toFixed(1).replace(".", ",");
}

async function fetchOnce() {
  const res = await fetch(CSV_URL + "&cb=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  const trimmed = text.trim();
  if (!trimmed) throw new Error("Respuesta vacía");
  const quoteCount = (trimmed.match(/"/g) || []).length;
  if (quoteCount % 2 !== 0) throw new Error("CSV truncado");
  return parseCSV(trimmed);
}

async function fetchData() {
  let parsed = null;
  let lastErr = null;

  // Hasta 3 intentos ante fallas de red o respuestas truncadas.
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      parsed = await fetchOnce();
      break;
    } catch (e) {
      lastErr = e;
      await new Promise(r => setTimeout(r, 400));
    }
  }

  if (parsed) {
    // REGLA CLAVE: Google Sheets a veces sirve una versión cacheada/parcial de la
    // publicación CSV. Nunca aceptamos un resultado con MENOS filas que el que ya
    // tenemos validado — los registros no desaparecen de la planilla, así que una
    // caída en el conteo siempre significa una respuesta incompleta, nunca un dato real.
    if (parsed.length >= records.length) {
      records = parsed;
    }
    document.getElementById("error-msg").style.display = "none";
  } else if (lastErr && records.length === 0) {
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.textContent = "No se pudo cargar la planilla: " + lastErr.message;
  }
  render();
}

function setWindow(mins) {
  currentWindow = mins;
  document.querySelectorAll(".btn-total, .tab").forEach(b => {
    b.classList.toggle("active", +b.dataset.min === mins);
  });
  render();
}

function getMins() {
  const now = new Date();
  if (currentWindow > 0) return currentWindow;
  // TOTAL: desde las 9:00 AM del día seleccionado (o de hoy si no se eligió fecha)
  let base = now;
  if (selectedDate) {
    const [y, m, d] = selectedDate.split("-").map(Number);
    base = new Date(y, m - 1, d);
  }
  const start9 = new Date(base.getFullYear(), base.getMonth(), base.getDate(), 9, 0, 0);
  const end = selectedDate && dateKey(base) !== dateKey(now) ? new Date(base.getFullYear(), base.getMonth(), base.getDate(), 23, 59, 59) : now;
  return Math.max(1, Math.round((end - start9) / 60000));
}

function render() {
  const now = new Date();
  const isTotal = currentWindow === 0;

  // Filtrar primero por la fecha seleccionada (si hay alguna elegida)
  let dayFiltered = records;
  if (selectedDate) {
    dayFiltered = records.filter(r => dateKey(r.date) === selectedDate);
  }

  // Para RESUMEN: totales del día completo seleccionado (o de todos los registros si no hay fecha elegida)
  const resumenSet = selectedDate ? dayFiltered : records;
  let resumenTrans = 0;
  resumenSet.forEach(r => {
    if (r.servicios) resumenTrans += r.servicios.split(" | ").filter(x => x.trim()).length;
  });
  const resumenAfi = resumenSet.filter(r => r.pertenece === "Sí pertenece").length;
  document.getElementById("val-resumen-trans").textContent = resumenTrans;
  document.getElementById("val-resumen-afi").textContent = resumenAfi;

  const cutoff = isTotal ? new Date(0) : new Date(now.getTime() - currentWindow * 60000);
  const subset = isTotal ? dayFiltered : dayFiltered.filter(r => r.date >= cutoff);
  const mins = getMins();

  const total = subset.length;
  const si = subset.filter(r => r.pertenece === "Sí pertenece").length;
  const no = subset.filter(r => r.pertenece === "No pertenece").length;

  const svcCounts = {};
  SVCS.forEach(s => svcCounts[s.key] = 0);
  let totalSvc = 0;
  subset.forEach(r => {
    if (r.servicios) {
      r.servicios.split(" | ").forEach(s => {
        s = s.trim();
        if (s in svcCounts) { svcCounts[s]++; totalSvc++; }
      });
    }
  });

  let s1 = 0, s2 = 0, s3 = 0;
  subset.filter(r => r.pertenece === "Sí pertenece").forEach(r => {
    if (!r.servicios) return;
    const n = r.servicios.split(" | ").filter(x => x.trim()).length;
    if (n === 1) s1++;
    else if (n === 2) s2++;
    else if (n >= 3) s3++;
  });

  // TRANSACCIONES
  document.getElementById("val-svc-total").textContent = totalSvc;
  document.getElementById("rate-svc-total").textContent = fmt(totalSvc / mins) + " x min";

  // REGISTROS
  document.getElementById("val-total").textContent = total;
  document.getElementById("rate-total").textContent = fmt(total / mins) + " x min";
  document.getElementById("val-si").textContent = si;
  document.getElementById("rate-si").textContent = fmt(si / mins) + " x min";
  document.getElementById("val-no").textContent = no;
  document.getElementById("rate-no").textContent = fmt(no / mins) + " x min";

  // AFILIADOS USAN SERVICIOS (sin tasa)
  document.getElementById("val-s1").textContent = s1;
  document.getElementById("val-s2").textContent = s2;
  document.getElementById("val-s3").textContent = s3;

  // Barras
  const counts = SVCS.map(s => svcCounts[s.key] || 0);
  const maxVal = Math.max(...counts, 1);
  const BAR_MAX_H = 160;

  const wrap = document.getElementById("bars-wrap");
  const ratesRow = document.getElementById("bar-rates");
  const labelsRow = document.getElementById("bar-labels");
  wrap.innerHTML = "";
  ratesRow.innerHTML = "";
  labelsRow.innerHTML = "";

  SVCS.forEach((svc, i) => {
    const c = counts[i];
    const barH = Math.max(4, Math.round((c / maxVal) * BAR_MAX_H));

    const col = document.createElement("div");
    col.className = "bar-col";
    col.innerHTML = `
      <div class="bar-stack" style="height:${BAR_MAX_H}px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">
        <div class="bar-val" style="margin-bottom:5px;">${c}</div>
        <div class="bar-inner" style="height:${barH}px;background:${svc.color};"></div>
      </div>
    `;
    wrap.appendChild(col);

    const rd = document.createElement("div");
    rd.className = "bar-rate";
    rd.textContent = fmt(c / mins) + " x min";
    ratesRow.appendChild(rd);

    const lbl = document.createElement("div");
    lbl.className = "bar-label";
    lbl.textContent = svc.label;
    labelsRow.appendChild(lbl);
  });

  document.getElementById("last-updated").textContent =
    "Actualizado " + now.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

fetchData();
setInterval(fetchData, 30000);

// Inicializar selector de fecha con el día de hoy
(function initDatePicker() {
  const now = new Date();
  const todayKey = dateKey(now);
  const picker = document.getElementById("date-picker");
  picker.value = todayKey;
  selectedDate = todayKey;
})();
</script>
</body>
</html>
